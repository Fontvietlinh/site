<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FONT VIỆT LINH - Chữ Việt cho người Việt</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --vip-gold: #F77F00; /* Màu cam chủ đạo cho VIP */
            --vip-red: #F77F00; 
            --bg: #ffffff; --card-bg: #ffffff; --text-main: #202124; --text-sub: #5f6368; --border: #dfe1e5; --nav-bg: #ffffff;
            --btn-free-bg: #003049; --btn-free-text: #ffffff;
            --bg-paper: url('images/bg-paper.jpg'); 
        }

        /* GIAO DIỆN PAPER */
        [data-theme='paper'] {
            --vip-gold: #F77F00;
            --vip-red: #F77F00;
            --bg: #EED9B9;
            --card-bg: #FFEDCE;
            --text-main: #F77F00;
            --text-sub: #FFFFFF;
            --border: #F77F00;
            --nav-bg: #132440;
            --btn-free-bg: #003049;
            --btn-free-text: #ffffff;
            background-image: var(--bg-paper); background-attachment: fixed;
        }

        /* GIAO DIỆN ĐEN */
        [data-theme='dark'] {
            --bg: #121212; --card-bg: #1e1e1e; --text-main: #e4e6eb; --text-sub: #b0b3b8; --border: #333; --nav-bg: #1a1a1a;
            --vip-red: #F77F00; 
            --btn-free-bg: #003049; /* Đã đổi màu nút tải ngay ở giao diện đen */
        }

        body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 0; transition: 0.3s; }
        
        header { 
            background-image: var(--bg-paper); background-size: cover; background-position: center;
            padding: 12px 20px; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-top { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 45px; width: auto; object-fit: contain; }
        .logo-info { display: flex; flex-direction: column; }
        .logo-text { font-size: 18px; font-weight: 800; color: #333; white-space: nowrap; line-height: 1.1; letter-spacing: 0.5px; }
        .logo-slogan { font-size: 11px; font-style: italic; color: #555; margin-top: 3px; white-space: nowrap; }

        .search-area { flex-grow: 1; display: flex; justify-content: center; margin: 0 15px; }
        .search-container { width: 100%; max-width: 350px; display: flex; border: 1px solid var(--border); border-radius: 20px; padding: 6px 15px; background: rgba(255,255,255,0.8); }
        .search-container input { border: none; outline: none; width: 100%; font-size: 14px; color: #000; background: transparent; }

        .theme-area { display: flex; gap: 10px; }
        .theme-btn { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #ccc; cursor: pointer; transition: 0.2s; }
        .btn-white { background: #ffffff; }
        .btn-paper { background: #EED9B9; }
        .btn-dark { background: #242526; }

        @media (max-width: 600px) {
            header { padding: 10px; }
            .header-top { flex-wrap: wrap; }
            .logo-area { flex: 1; }
            .logo-img { height: 38px; }
            .logo-text { font-size: 16px; }
            .logo-slogan { font-size: 10px; }
            .search-area { order: 3; width: 100%; margin: 10px 0 0 0; }
            .search-container { max-width: 100%; }
            .theme-area { order: 2; gap: 6px; }
            .theme-btn { width: 16px; height: 16px; }
        }

        nav { background: var(--nav-bg); padding: 12px; text-align: center; border-bottom: 1px solid var(--border); overflow-x: auto; white-space: nowrap; }
        nav a { margin: 0 12px; text-decoration: none; color: var(--text-sub); font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        nav a:hover, nav a.active { color: var(--vip-gold); }
        .nav-external { color: var(--vip-gold) !important; font-weight: 700; }

        .font-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 25px; max-width: 1300px; margin: 0 auto; }
        .font-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid var(--border); position: relative; transition: 0.3s; backdrop-filter: blur(5px); }
        .font-card:hover { transform: translateY(-6px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        
        .badge-vip { position: absolute; top: 12px; right: 12px; background: var(--vip-gold); color: #fff; padding: 5px 12px; border-radius: 6px; font-size: 10px; font-weight: 800; z-index: 1; }
        .font-img { width: 100%; height: 190px; object-fit: cover; background: #f8f9fa; border-bottom: 1px solid var(--border); }
        .font-info { padding: 20px; text-align: center; }
        .font-title { font-weight: 600; font-size: 15px; color: var(--text-main); margin-bottom: 5px; line-height: 1.4; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        
        .font-price { color: var(--vip-red); font-weight: 700; font-size: 13px; margin-bottom: 15px; display: block; }
        .font-price span { text-transform: lowercase; }

        .btn-download { 
            background: var(--btn-free-bg);
            color: var(--btn-free-text); padding: 10px 20px; border-radius: 25px; text-decoration: none; 
            font-size: 13px; font-weight: 700; display: inline-block; width: 85%; border: none;
        }
        .btn-paid { background: #F77F00 !important; color: #fff !important; }

        .load-more-container { text-align: center; padding: 50px; }
        #load-more-btn { background: var(--nav-bg); color: #fff; border: 2px solid var(--vip-gold); padding: 12px 45px; border-radius: 30px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="logo-area">
                <img src="images/logo.png" class="logo-img" alt="Logo FONT VIỆT LINH">
                <div class="logo-info">
                    <span class="logo-text">FONT VIỆT LINH</span>
                    <span class="logo-slogan">Chữ Việt cho người Việt</span>
                </div>
            </div>
            <div class="search-area">
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Tìm font..." onkeypress="handleSearch(event)">
                </div>
            </div>
            <div class="theme-area">
                <div class="theme-btn btn-white" onclick="setTheme('white')"></div>
                <div class="theme-btn btn-paper" onclick="setTheme('paper')"></div>
                <div class="theme-btn btn-dark" onclick="setTheme('dark')"></div>
            </div>
        </div>
    </header>

    <nav id="category-nav">
        <a onclick="loadByLabel('')" class="active">Tất cả</a>
        <a onclick="loadByLabel('FontVietHoa')">Việt hóa</a>
        <a onclick="loadByLabel('FontTraPhi')">Font VIP</a>
        <a onclick="loadByLabel('FontVietLinh')">Thiết kế</a>
        <a href="https://www.facebook.com/FontVietLinh/posts/pfbid0MgsvYKxvMSTrqM5HR579RY4F2CHaqkPAJKk3Gz6UG4mTs8CtBpi7upVQbd7yHPJml" target="_blank" class="nav-external">Gói 4500 font</a>
        <a href="https://www.facebook.com/FontVietLinh/posts/pfbid027H6LU65Y7EPfawKGMgxU3BzBZ24cocA5AT4aQATPKAaaXFaa8DcYLcPJrsh695Efl" target="_blank" class="nav-external">Gói Cập Nhật T1-T6</a>
        <a href="https://www.facebook.com/FontVietLinh/" target="_blank">Liên hệ</a>
        <a href="https://zalo.me/0902922811" target="_blank">Zalo</a>
    </nav>

    <div class="font-grid" id="font-container"></div>
    <div class="load-more-container"><button id="load-more-btn" onclick="fetchPosts()">XEM THÊM FONT</button></div>

    <script>
        const blogId = "5243210247122196079";
        let startIndex = 1;
        const maxResults = 24;
        let currentLabel = '';
        let currentSearch = '';

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('font-linh-theme', theme);
        }
        setTheme(localStorage.getItem('font-linh-theme') || 'paper');

        function fetchPosts() {
            const script = document.createElement('script');
            let url = `https://www.blogger.com/feeds/${blogId}/posts/default?alt=json-in-script&callback=render&start-index=${startIndex}&max-results=${maxResults}`;
            if (currentLabel) url = `https://www.blogger.com/feeds/${blogId}/posts/default/-/${currentLabel}?alt=json-in-script&callback=render&start-index=${startIndex}&max-results=${maxResults}`;
            if (currentSearch) url += `&q=${encodeURIComponent(currentSearch)}`;
            script.src = url; document.body.appendChild(script);
        }

        function render(data) {
            const container = document.getElementById('font-container');
            if (!data.feed.entry) { document.getElementById('load-more-btn').innerText = "Hết dữ liệu"; return; }
            
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

            data.feed.entry.forEach(post => {
                const title = post.title.$t;
                const blogLink = post.link.find(l => l.rel === 'alternate').href;
                const content = post.content.$t;
                const labels = post.category ? post.category.map(c => c.term) : [];
                
                let priceText = "";
                let isPaid = false;
                const priceMatch = content.match(/(Giá|Gia|Phí Việt hóa|Phí Việt Hoá):\s*([0-9.kđĐ]+)/i);
                if (priceMatch) {
                    isPaid = true;
                    priceText = "Phí Việt Hoá: <span>" + priceMatch[2].toLowerCase() + "</span>";
                }

                let downloadLink = "";
                const driveMatch = content.match(/https:\/\/drive\.google\.com\/[^<"\s]+/);
                const bitlyMatch = content.match(/https:\/\/bit\.ly\/[^<"\s]+/);
                if (driveMatch) { downloadLink = driveMatch[0].replace(/&amp;/g, '&'); }
                else if (bitlyMatch) { downloadLink = bitlyMatch[0]; }

                const isVip = labels.some(l => l === 'FontTraPhi' || l === 'FontVip' || l.toUpperCase().includes('VIP')) || isPaid;
                
                let finalLink = isVip ? (isMobile ? "https://m.me/FontVietLinh" : "https://www.facebook.com/messages/t/FontVietLinh") : (downloadLink ? downloadLink : blogLink);
                
                const btnTxt = isVip ? "Mua ngay" : "Tải ngay";
                const btnCls = isVip ? "btn-paid" : "btn-free";

                let img = "https://via.placeholder.com/400x250?text=Font+Viet+Linh";
                if (content.includes('<img')) {
                    const m = content.match(/src="([^"]+)"/);
                    if (m) img = m[1];
                }

                container.innerHTML += `<div class="font-card">${isVip ? '<div class="badge-vip">PREMIUM</div>' : ''}<img src="${img}" class="font-img" alt="${title}" loading="lazy"><div class="font-info"><div class="font-title">${title}</div><div class="font-price">${priceText ? priceText : 'Miễn phí'}</div><a href="${finalLink}" target="_blank" class="btn-download ${btnCls}">${btnTxt}</a></div></div>`;
            });
            startIndex += maxResults;
        }

        function loadByLabel(label) {
            currentLabel = label; currentSearch = '';
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            if (event && event.target.tagName === 'A') event.target.classList.add('active');
            resetAndFetch();
        }

        function handleSearch(e) { if (e.key === 'Enter') { currentSearch = document.getElementById('searchInput').value; currentLabel = ''; resetAndFetch(); } }
        function resetAndFetch() { document.getElementById('font-container').innerHTML = ''; startIndex = 1; document.getElementById('load-more-btn').innerText = "XEM THÊM FONT"; fetchPosts(); }
        fetchPosts();
    </script>
</body>
</html>
