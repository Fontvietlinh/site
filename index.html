<!DOCTYPE html>
<html lang="vi">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FONT VIỆT LINH - Chữ Việt cho người Việt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&family=Alfa+Slab+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-body: 'Be Vietnam Pro', sans-serif;
      --font-display: 'Alfa Slab One', 'Cormorant Garamond', serif;
      --transition: 220ms cubic-bezier(0.16, 1, 0.3, 1);
      --color-bg: #f7f5f0;
      --color-surface: rgba(255,255,255,0.72);
      --color-text: #191919;
      --color-text-muted: #68645c;
      --color-border: rgba(25,25,25,0.10);
      --color-divider: rgba(25,25,25,0.08);
      --color-accent: #8a6a2f;
      --price-color: #8a6a2f;
      --btn-free-bg: #111111;
      --btn-free-text: #ffffff;
      --btn-paid-bg: #8a6a2f;
      --btn-paid-text: #ffffff;
      --color-card-shadow: 0 18px 45px rgba(17,17,17,0.08);
    }

    [data-theme='paper'] {
      --color-bg: #efe3cf;
      --color-surface: rgba(255,248,236,0.72);
      --color-text: #2c2117;
      --color-text-muted: #73614f;
      --color-accent: #7a4f1d;
      --price-color: #7a4f1d;
      --btn-free-bg: #2f2217;
      --btn-paid-bg: #7a4f1d;
    }

    [data-theme='dark'] {
      --color-bg: #0b0b0b;
      --color-surface: rgba(20,20,20,0.82);
      --color-text: #efede8;
      --color-text-muted: #a9a39a;
      --color-accent: #c4a25a;
      --price-color: #d5b676;
      --btn-free-bg: #f2eee6;
      --btn-free-text: #0b0b0b;
      --btn-paid-bg: #c4a25a;
      --btn-paid-text: #121212;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: var(--font-body);
      color: var(--color-text);
      background-color: var(--color-bg);
      transition: background-color var(--transition), color var(--transition);
    }

    .site-shell { width: min(1440px, calc(100% - 28px)); margin: 20px auto; }

    header { position: sticky; top: 12px; z-index: 100; margin-bottom: 1rem; }
    .header-panel {
      display: grid; grid-template-columns: auto 1fr auto;
      align-items: center; gap: 1.25rem; padding: 16px 18px;
      border: 1px solid var(--color-border); background: var(--color-surface);
      backdrop-filter: blur(18px); border-radius: 24px; box-shadow: var(--color-card-shadow);
    }

    .logo-area { display: flex; align-items: center; gap: 14px; }
    .logo-mark { width: 72px; height: 72px; border-radius: 22px; padding: 8px; background: rgba(255,255,255,0.9); border: 1px solid var(--color-border); }
    .logo-img { width: 100%; height: 100%; object-fit: contain; }
    .logo-text { font-family: var(--font-display); font-size: 1.5rem; color: var(--color-text); }

    .search-container { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border: 1px solid var(--color-border); background: rgba(255,255,255,0.1); border-radius: 999px; }
    .search-container input { border: none; background: transparent; color: inherit; width: 100%; outline: none; }

    .theme-area { display: flex; gap: 8px; }
    .theme-btn { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 1px solid var(--color-border); }
    .btn-white { background: #fff; } .btn-paper { background: #d5b892; } .btn-dark { background: #131313; }

    nav { display: flex; gap: 10px; padding: 10px 0; overflow-x: auto; }
    nav a { padding: 8px 16px; border-radius: 999px; text-decoration: none; color: var(--color-text-muted); font-weight: 600; cursor: pointer; font-size: 0.9rem; }
    nav a.active { background: var(--color-surface); color: var(--color-text); border: 1px solid var(--color-border); }

    .font-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    .font-card { background: var(--color-surface); border-radius: 28px; border: 1px solid var(--color-border); overflow: hidden; transition: all var(--transition); position: relative; }
    .font-card:hover { transform: translateY(-5px); box-shadow: 0 26px 70px rgba(17,17,17,0.14); }

    .badge-vip { position: absolute; top: 12px; right: 12px; z-index: 2; background: linear-gradient(135deg, #c9920a, #f5c842); color: #1a0f00; font-size: 11px; font-weight: 900; padding: 4px 10px; border-radius: 999px; }

    .media-wrap { aspect-ratio: 16/10; overflow: hidden; background: #eee; border-bottom: 1px solid var(--color-divider); }
    .font-img { width: 100%; height: 100%; object-fit: cover; }

    .font-info { padding: 18px; display: flex; flex-direction: column; gap: 10px; }
    .font-title { font-weight: 700; font-size: 1.1rem; min-height: 2.8em; line-height: 1.4; }
    
    .font-meta-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .font-price { color: var(--price-color); font-weight: 700; font-size: 1rem; }
    
    /* STYLE MỚI CHO SỐ LƯỢNG STYLE - TO VÀ RÕ RÀNG HƠN */
    .font-count {
      font-size: 13px; /* Tăng kích thước từ 11px lên 13px */
      font-weight: 700;
      color: var(--color-text-muted);
      background: var(--color-divider);
      padding: 4px 12px; /* Tăng padding để ô trông cân đối hơn */
      border-radius: 8px;
    }

    .btn-download { display: block; width: 100%; padding: 14px; text-align: center; border-radius: 16px; text-decoration: none; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; transition: transform 0.2s; }
    .btn-download:hover { transform: scale(1.02); }
    .btn-free { background: var(--btn-free-bg); color: var(--btn-free-text); }
    .btn-paid { background: var(--btn-paid-bg); color: var(--btn-paid-text); }

    #load-more-btn { display: block; margin: 30px auto; padding: 12px 40px; border-radius: 999px; border: 1px solid var(--color-border); background: transparent; color: inherit; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div class="site-shell">
    <header>
      <div class="header-panel">
        <div class="logo-area">
          <div class="logo-mark"><img src="images/logo.png" class="logo-img" alt="Logo"></div>
          <div class="logo-info"><span class="logo-text">FONT VIỆT LINH</span></div>
        </div>
        <div class="search-area"><div class="search-container"><input type="text" id="searchInput" placeholder="Tìm font..." onkeypress="handleSearch(event)"></div></div>
        <div class="theme-area">
          <button class="theme-btn btn-white" onclick="setTheme('white')"></button>
          <button class="theme-btn btn-paper" onclick="setTheme('paper')"></button>
          <button class="theme-btn btn-dark" onclick="setTheme('dark')"></button>
        </div>
      </div>
    </header>

    <nav id="category-nav">
      <a onclick="loadByLabel('')" class="active">Tất cả</a>
      <a onclick="loadByLabel('FontVietHoa')">Việt hóa</a>
      <a onclick="loadByLabel('FontTraPhi')">Font VIP</a>
      <a onclick="loadByLabel('FontVietLinh')">Thiết kế</a>
      <a href="https://zalo.me/0902922811" target="_blank">Zalo</a>
    </nav>

    <div class="font-grid" id="font-container"></div>
    <button id="load-more-btn" onclick="fetchPosts()">Xem thêm font</button>
  </div>

  <script>
    const blogId = "5243210247122196079";
    let startIndex = 1, maxResults = 24, currentLabel = '', currentSearch = '', totalLoaded = 0;

    function setTheme(t) { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('f-theme', t); }
    setTheme(localStorage.getItem('f-theme') || 'paper');

    function fetchPosts() {
      const s = document.createElement('script');
      let url = `https://www.blogger.com/feeds/${blogId}/posts/default?alt=json-in-script&callback=render&start-index=${startIndex}&max-results=${maxResults}`;
      if (currentLabel) url = `https://www.blogger.com/feeds/${blogId}/posts/default/-/${currentLabel}?alt=json-in-script&callback=render&start-index=${startIndex}&max-results=${maxResults}`;
      if (currentSearch) url += `&q=${encodeURIComponent(currentSearch)}`;
      s.src = url; document.body.appendChild(s);
    }

    function render(data) {
      const container = document.getElementById('font-container');
      if (!data.feed.entry) { document.getElementById('load-more-btn').innerText = "Hết dữ liệu"; return; }

      data.feed.entry.forEach(post => {
        const title = post.title.$t;
        const blogLink = post.link.find(l => l.rel === 'alternate').href;
        const content = post.content.$t;
        const labels = post.category ? post.category.map(c => c.term) : [];

        // Lấy thông tin giá
        let price = "Miễn phí", isPaid = false;
        const pMatch = content.match(/(Giá|Phí Việt hóa|Phí Việt Hoá):\s*([0-9.kđĐ]+)/i);
        if (pMatch) { price = "phí: " + pMatch[2].toLowerCase(); isPaid = true; }

        // LOGIC: Lấy số lượng style/styles viết thường
        let countDisplay = "1 style"; 
        const styleMatch = content.match(/(Số font|Số Styles|Số style):\s*(\d+)/i);
        if (styleMatch) {
          const num = parseInt(styleMatch[2]);
          countDisplay = num > 1 ? `${num} styles` : `${num} style`;
        }

        let download = "";
        const dMatch = content.match(/https:\/\/(drive\.google\.com|bit\.ly)\/[^<"\s]+/);
        if (dMatch) download = dMatch[0].replace(/&amp;/g, '&');

        const isVip = labels.some(l => l.includes('VIP') || l.includes('TraPhi')) || isPaid;
        const finalLink = isVip ? "https://m.me/FontVietLinh" : (download || blogLink);
        
        let img = "https://via.placeholder.com/400x250";
        const m = content.match(/src="([^"]+)"/);
        if (m) img = m[1];

        const card = document.createElement('div');
        card.className = 'font-card';
        card.innerHTML = `
          ${isVip ? '<div class="badge-vip">VIP</div>' : ''}
          <div class="media-wrap"><img src="${img}" class="font-img" alt="${title}"></div>
          <div class="font-info">
            <div class="font-title">${title}</div>
            <div class="font-meta-row">
              <div class="font-price">${price}</div>
              <div class="font-count">${countDisplay}</div>
            </div>
            <a href="${finalLink}" target="_blank" class="btn-download ${isVip ? 'btn-paid' : 'btn-free'}">
              ${isVip ? 'Mua ngay' : 'Tải ngay'}
            </a>
          </div>`;
        container.appendChild(card);
      });
      startIndex += maxResults;
    }

    function loadByLabel(l) { currentLabel = l; currentSearch = ''; reset(); }
    function handleSearch(e) { if (e.key === 'Enter') { currentSearch = document.getElementById('searchInput').value; currentLabel = ''; reset(); } }
    function reset() { document.getElementById('font-container').innerHTML = ''; startIndex = 1; fetchPosts(); }

    fetchPosts();
  </script>
</body>
</html>
