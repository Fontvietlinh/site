<!DOCTYPE html>
<html lang="vi">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8a6a2f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FontVietLinh">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FONT VIỆT LINH - Chữ Việt cho người Việt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&family=Alfa+Slab+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-body: 'Be Vietnam Pro', sans-serif;
      --font-display: 'Alfa Slab One', 'Cormorant Garamond', serif;

      --text-xs: clamp(0.75rem, 0.72rem + 0.1vw, 0.82rem);
      --text-sm: clamp(0.875rem, 0.84rem + 0.18vw, 0.98rem);
      --text-base: clamp(1rem, 0.97rem + 0.2vw, 1.1rem);
      --text-lg: clamp(1.15rem, 1.03rem + 0.45vw, 1.45rem);
      --text-xl: clamp(1.8rem, 1.4rem + 1.2vw, 2.7rem);

      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --space-20: 5rem;

      --radius-sm: 0.5rem;
      --radius-md: 0.9rem;
      --radius-lg: 1.2rem;
      --radius-xl: 1.6rem;
      --radius-full: 999px;

      --transition: 220ms cubic-bezier(0.16, 1, 0.3, 1);

      --bg-paper: none;
      --color-bg: #f7f5f0;
      --color-surface: rgba(255,255,255,0.72);
      --color-surface-2: rgba(255,255,255,0.92);
      --color-text: #191919;
      --color-text-muted: #68645c;
      --color-border: rgba(25,25,25,0.10);
      --color-divider: rgba(25,25,25,0.08);
      --color-primary: #111111;
      --color-primary-hover: #2b2b2b;
      --color-accent: #8a6a2f;
      --color-accent-soft: rgba(138,106,47,0.12);
      --color-nav: rgba(255,255,255,0.65);
      --color-search: rgba(255,255,255,0.82);
      --color-card-shadow: 0 18px 45px rgba(17,17,17,0.08);
      --color-card-shadow-hover: 0 26px 70px rgba(17,17,17,0.14);
      --btn-free-bg: #111111;
      --btn-free-text: #ffffff;
      --btn-paid-bg: #8a6a2f;
      --btn-paid-text: #ffffff;
      --price-color: #8a6a2f;
      --badge-bg: #111111;
      --badge-text: #ffffff;
      --load-more-bg: transparent;
      --load-more-text: #111111;
      --logo-text: #111111;
      --logo-subtext: #5f5a52;
      --backdrop-blur: blur(18px);
    }

    [data-theme='paper'] {
      --color-bg: #efe3cf;
      --color-surface: rgba(255,248,236,0.72);
      --color-surface-2: rgba(255,246,231,0.92);
      --color-text: #2c2117;
      --color-text-muted: #73614f;
      --color-border: rgba(69,48,28,0.14);
      --color-divider: rgba(69,48,28,0.10);
      --color-primary: #2f2217;
      --color-primary-hover: #4c3826;
      --color-accent: #7a4f1d;
      --color-accent-soft: rgba(122,79,29,0.12);
      --color-nav: rgba(58,39,24,0.88);
      --color-search: rgba(255,248,237,0.76);
      --color-card-shadow: 0 20px 50px rgba(61,41,23,0.10);
      --color-card-shadow-hover: 0 32px 80px rgba(61,41,23,0.16);
      --btn-free-bg: #2f2217;
      --btn-free-text: #fff8ef;
      --btn-paid-bg: #7a4f1d;
      --btn-paid-text: #fff8ef;
      --price-color: #7a4f1d;
      --badge-bg: #2f2217;
      --badge-text: #fff8ef;
      --load-more-text: #2f2217;
      --logo-text: #2f2217;
      --logo-subtext: #6d5b49;
      --bg-paper: radial-gradient(circle at top left, rgba(255,255,255,0.35), transparent 38%), linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0));
    }

    [data-theme='dark'] {
      --color-bg: #0b0b0b;
      --color-surface: rgba(20,20,20,0.82);
      --color-surface-2: rgba(26,26,26,0.94);
      --color-text: #efede8;
      --color-text-muted: #a9a39a;
      --color-border: rgba(239,237,232,0.10);
      --color-divider: rgba(239,237,232,0.08);
      --color-primary: #f2eee6;
      --color-primary-hover: #ffffff;
      --color-accent: #c4a25a;
      --color-accent-soft: rgba(196,162,90,0.12);
      --color-nav: rgba(18,18,18,0.84);
      --color-search: rgba(23,23,23,0.88);
      --color-card-shadow: 0 20px 52px rgba(0,0,0,0.38);
      --color-card-shadow-hover: 0 34px 90px rgba(0,0,0,0.52);
      --btn-free-bg: #f2eee6;
      --btn-free-text: #0b0b0b;
      --btn-paid-bg: #c4a25a;
      --btn-paid-text: #121212;
      --price-color: #d5b676;
      --badge-bg: #f2eee6;
      --badge-text: #121212;
      --load-more-text: #f2eee6;
      --logo-text: #f2eee6;
      --logo-subtext: #a9a39a;
      --bg-paper: radial-gradient(circle at top left, rgba(255,255,255,0.04), transparent 40%);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background:
        radial-gradient(circle at top right, var(--color-accent-soft), transparent 24%),
        radial-gradient(circle at left center, rgba(255,255,255,0.05), transparent 24%),
        var(--bg-paper),
        var(--color-bg);
      transition: background-color var(--transition), color var(--transition);
    }

    a, button, input { font: inherit; }
    img { display: block; max-width: 100%; }

    .site-shell {
      width: min(1440px, calc(100% - 28px));
      margin: 20px auto 32px;
    }

    header {
      position: sticky;
      top: 12px;
      z-index: 100;
      margin-bottom: var(--space-4);
    }

    .header-panel {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: var(--space-5);
      padding: 16px 18px;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      backdrop-filter: var(--backdrop-blur);
      -webkit-backdrop-filter: var(--backdrop-blur);
      border-radius: 24px;
      box-shadow: var(--color-card-shadow);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .logo-mark {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      padding: 8px;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.24);
      flex: 0 0 auto;
    }

    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .logo-info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 1rem + 0.6vw, 1.6rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      color: var(--logo-text);
      white-space: nowrap;
    }

    .logo-slogan {
      font-size: var(--text-sm);
      color: var(--logo-subtext);
      white-space: nowrap;
    }

    .search-area {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }

    .search-container {
      width: min(100%, 460px);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: 1px solid var(--color-border);
      background: var(--color-search);
      border-radius: 999px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .search-container::before {
      content: '⌕';
      font-size: 16px;
      color: var(--color-text-muted);
      line-height: 1;
    }

    .search-container input {
      width: 100%;
      border: none;
      outline: none;
      color: var(--color-text);
      background: transparent;
      font-size: var(--text-sm);
    }

    .theme-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px;
      border-radius: 999px;
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
    }

    .theme-btn {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.24);
      cursor: pointer;
      transition: transform var(--transition);
    }

    .btn-white { background: linear-gradient(135deg, #ffffff, #d9d4ca); }
    .btn-paper { background: linear-gradient(135deg, #d5b892, #7a4f1d); }
    .btn-dark { background: linear-gradient(135deg, #131313, #7a7a7a); }

    .sort-btn {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      font-weight: 700;
      cursor: pointer;
      margin-left: auto;
      transition: all var(--transition);
    }

    .sort-btn.active {
      color: var(--color-accent);
      border-color: var(--color-accent);
      background: var(--color-accent-soft);
    }

    nav {
      display: flex;
      align-items: center;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 8px 4px;
      scrollbar-width: none;
    }
    nav::-webkit-scrollbar { display: none; }

    nav a {
      flex: 0 0 auto;
      text-decoration: none;
      color: var(--color-text-muted);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: var(--text-sm);
      font-weight: 600;
      transition: all var(--transition);
      cursor: pointer;
    }

    nav a:hover, nav a.active {
      color: var(--color-text);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
    }

    .font-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(300px, 100%), 1fr));
      gap: 24px;
      padding: 22px 0 12px;
    }

    .font-card {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      backdrop-filter: var(--backdrop-blur);
      box-shadow: var(--color-card-shadow);
      transition: all 260ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .font-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--color-card-shadow-hover);
    }

    .badge-vip {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      border-radius: 999px;
      background: linear-gradient(135deg, #c9920a 0%, #f5c842 55%, #e8a800 100%);
      color: #1a0f00;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .media-wrap {
      aspect-ratio: 16/10;
      overflow: hidden;
      background: var(--color-surface-2);
      border-bottom: 1px solid var(--color-divider);
    }

    .font-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 500ms ease;
    }

    .font-info {
      padding: 16px 18px 18px;
    }

    .font-title {
      font-weight: 700;
      color: var(--color-text);
      min-height: 2.8em;
    }

    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 48px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      margin-top: 12px;
      transition: all var(--transition);
    }

    .btn-free { background: var(--btn-free-bg); color: var(--btn-free-text); }
    .btn-paid { background: var(--btn-paid-bg); color: var(--btn-paid-text); }

    .load-more-container { text-align: center; padding: 50px 0; }
    #load-more-btn {
      min-width: 220px;
      padding: 12px 26px;
      border-radius: 999px;
      border: 1px solid var(--color-border);
      background: transparent;
      font-weight: 700;
      cursor: pointer;
    }

    @media (max-width: 980px) {
      .header-panel { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <header>
      <div class="header-panel">
        <div class="logo-area">
          <div class="logo-mark">
            <img src="images/logo.png" class="logo-img" alt="Logo FONT VIỆT LINH">
          </div>
          <div class="logo-info">
            <span class="logo-text">FONT VIỆT LINH</span>
            <span class="logo-slogan">Chữ Việt cho người Việt</span>
          </div>
        </div>

        <div class="search-area">
          <div class="search-container">
            <input type="text" id="searchInput" placeholder="Tìm font..." onkeypress="handleSearch(event)">
          </div>
        </div>

        <div class="theme-area">
          <button class="theme-btn btn-white" onclick="setTheme('white')"></button>
          <button class="theme-btn btn-paper" onclick="setTheme('paper')"></button>
          <button class="theme-btn btn-dark" onclick="setTheme('dark')"></button>
        </div>
      </div>
    </header>

    <nav id="category-nav">
      <a onclick="loadByLabel('')" class="active">Tất cả</a>
      <a onclick="loadByLabel('FontVietHoa')">Việt hóa</a>
      <a onclick="loadByLabel('FontTraPhi')">Font VIP</a>
      <a onclick="loadByLabel('FontVietLinh')">Thiết kế</a>
      <a onclick="openContact()">Liên hệ</a>
      <button class="sort-btn" id="sort-az-btn" onclick="toggleSort()">A → Z</button>
    </nav>
    <div class="font-grid" id="font-container"></div>
    <div class="load-more-container"><button id="load-more-btn" onclick="fetchPosts()">Xem thêm font</button></div>
  </div>

  <script>
    const blogId = "5243210247122196079";
    let startIndex = 1;
    const maxResults = 24;
    let currentLabel = '';
    let currentSearch = '';
    let totalLoaded = 0;
    let sortAZ = false;

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('font-linh-theme', theme);
    }
    setTheme(localStorage.getItem('font-linh-theme') || 'paper');

    function fetchPosts() {
      const script = document.createElement('script');
      let url = `https://www.blogger.com/feeds/${blogId}/posts/default?alt=json-in-script&callback=render&start-index=${startIndex}&max-results=${maxResults}`;
      if (currentLabel) url = `https://www.blogger.com/feeds/${blogId}/posts/default/-/${currentLabel}?alt=json-in-script&callback=render&start-index=${startIndex}&max-results=${maxResults}`;
      if (currentSearch) url += `&q=${encodeURIComponent(currentSearch)}`;
      script.src = url;
      document.body.appendChild(script);
    }

    function render(data) {
      const container = document.getElementById('font-container');
      if (!data.feed.entry) {
        document.getElementById('load-more-btn').innerText = "Hết dữ liệu";
        return;
      }
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      data.feed.entry.forEach(function(post) {
        const title = post.title.$t;
        const blogLink = post.link.find(l => l.rel === 'alternate').href;
        const content = post.content.$t;
        const labels = post.category ? post.category.map(c => c.term) : [];

        let priceText = "";
        let isPaid = false;
        const priceMatch = content.match(/(Giá|Gia|Phí Việt hóa|Phí Việt Hoá):\s*([0-9.kđĐ]+)/i);
        if (priceMatch) { isPaid = true; priceText = "Phí Việt Hoá: " + priceMatch[2]; }

        let downloadLink = "";
        const driveMatch = content.match(/https:\/\/drive\.google\.com\/[^<"\s]+/);
        if (driveMatch) downloadLink = driveMatch[0].replace(/&amp;/g, '&');

        const isVip = labels.some(l => l.includes('VIP') || l === 'FontTraPhi') || isPaid;
        const finalLink = isVip ? (isMobile ? "https://m.me/FontVietLinh" : "https://www.facebook.com/messages/t/FontVietLinh") : (downloadLink || blogLink);

        let imgSrc = "https://via.placeholder.com/400x250?text=Font+Viet+Linh";
        const m = content.match(/src="([^"]+)"/);
        if (m) imgSrc = m[1];

        const card = document.createElement('div');
        card.className = 'font-card';
        card.dataset.order = totalLoaded++;
        card.innerHTML = `
          ${isVip ? `<div class="badge-vip">VIP</div>` : ''}
          <div class="media-wrap"><img src="${imgSrc}" class="font-img" alt="${title}" loading="lazy"></div>
          <div class="font-info">
            <div class="font-title">${title}</div>
            <div class="font-price" style="color:var(--price-color); font-weight:700; font-size:14px; margin-top:8px">${priceText || 'Miễn phí'}</div>
            <a href="${finalLink}" target="_blank" class="btn-download ${isVip ? 'btn-paid' : 'btn-free'}">${isVip ? 'Mua ngay' : 'Tải ngay'}</a>
          </div>`;
        container.appendChild(card);
      });
      startIndex += maxResults;
    }

    function loadByLabel(label) {
      currentLabel = label; currentSearch = '';
      document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
      if (event && event.target.tagName === 'A') event.target.classList.add('active');
      resetAndFetch();
    }

    function handleSearch(e) {
      if (e.key === 'Enter') {
        currentSearch = document.getElementById('searchInput').value;
        currentLabel = ''; resetAndFetch();
      }
    }

    function resetAndFetch() {
      document.getElementById('font-container').innerHTML = '';
      startIndex = 1; totalLoaded = 0; fetchPosts();
    }

    function openContact() {
      const url = /Android|iPhone/i.test(navigator.userAgent) ? "https://m.me/FontVietLinh" : "https://www.facebook.com/messages/t/FontVietLinh";
      window.open(url, '_blank');
    }

    // --- ĐĂNG KÝ SERVICE WORKER (BỔ SUNG) ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('PWA Ready!', reg))
          .catch(err => console.log('PWA Error', err));
      });
    }

    fetchPosts();
  </script>
</body>
</html>
